{% extends "base.html" %}
{% block title %}Forgot Password — ScoreMyCV{% endblock %}
{% block body %}
<div class="auth-panel-right" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div class="auth-box">
    <div class="auth-logo mb-3">
      <div class="logo-mark">SC</div>
      <span class="logo-text display-font">Score<span>My</span>CV</span>
    </div>
    <div class="auth-header">
      <h1>Reset your password</h1>
      <p>Enter your email and we'll send you a reset link.</p>
    </div>
    <div id="alert-box"></div>
    <form id="forgot-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email <span>*</span></label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
        <div class="form-error" id="email-error"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Send Reset Link</button>
    </form>
    <div class="auth-footer mt-3">
      <a href="/auth/login" style="color:var(--accent);">← Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById("forgot-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submit-btn");
  const email = document.getElementById("email").value.trim();
  const alertBox = document.getElementById("alert-box");
  alertBox.innerHTML = "";

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById("email-error").textContent = "Enter a valid email";
    return;
  }

  setLoading(btn, true);
  try {
    const data = await apiFetch("/auth/forgot-password", { method:"POST", body: JSON.stringify({ email }) });
    alertBox.innerHTML = `<div class="alert alert-success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="20 6 9 17 4 12"/></svg><span>${data.message}</span></div>`;
    btn.disabled = true;
    btn.textContent = "Email sent";
  } catch(e) {
    alertBox.innerHTML = `<div class="alert alert-error"><span>${e.message}</span></div>`;
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
