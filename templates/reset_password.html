{% extends "base.html" %}
{% block title %}Reset Password — ScoreMyCV{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg-page);">
  <div class="auth-box">
    <div class="auth-logo mb-3">
      <div class="logo-mark">SC</div>
      <span class="logo-text display-font">Score<span>My</span>CV</span>
    </div>
    <div class="auth-header">
      <h1>Set new password</h1>
      <p>Enter your new password below.</p>
    </div>
    <div id="alert-box"></div>
    <form id="reset-form" novalidate>
      <input type="hidden" id="token" value="{{ token }}">
      <div class="form-group">
        <label class="form-label">New Password <span>*</span></label>
        <div class="input-group">
          <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required>
          <button type="button" class="input-group-icon" onclick="document.getElementById('password').type=document.getElementById('password').type==='password'?'text':'password'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password <span>*</span></label>
        <input type="password" id="confirm" class="form-control" placeholder="Repeat password" required>
        <div class="form-error" id="confirm-error"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById("reset-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submit-btn");
  const token = document.getElementById("token").value;
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  const alertBox = document.getElementById("alert-box");
  alertBox.innerHTML = "";
  document.getElementById("confirm-error").textContent = "";

  if (password.length < 8) { alertBox.innerHTML = `<div class="alert alert-error"><span>Password must be at least 8 characters</span></div>`; return; }
  if (password !== confirm) { document.getElementById("confirm-error").textContent = "Passwords do not match"; return; }

  setLoading(btn, true);
  try {
    const data = await apiFetch("/auth/reset-password", { method:"POST", body: JSON.stringify({ token, password }) });
    alertBox.innerHTML = `<div class="alert alert-success"><span>${data.message}</span></div>`;
    setTimeout(() => window.location.href = "/auth/login", 1500);
  } catch(e) {
    alertBox.innerHTML = `<div class="alert alert-error"><span>${e.message}</span></div>`;
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
